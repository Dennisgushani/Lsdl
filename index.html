<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licht des Islam - Prayer Times</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h1 {
            color: #33aaff;
        }
        #prayer-times {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>Prayer Times for Menden, Germany</h1>
    <div id="prayer-times">
        <p>Loading...</p>
    </div>
    <script>
        const fetchPrayerTimes = async () => {
            const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Menden&country=Germany');
            const data = await response.json();
            const timings = data.data.timings;
            document.getElementById('prayer-times').innerHTML = `<ul>` +
                `<li>Fajr: ${timings.Fajr}</li>` +
                `<li>Sunrise: ${timings.Sunrise}</li>` +
                `<li>Dhuhr: ${timings.Dhuhr}</li>` +
                `<li>Asr: ${timings.Asr}</li>` +
                `<li>Maghrib: ${timings.Maghrib}</li>` +
                `<li>Isha: ${timings.Isha}</li>` +
                `</ul>`;
        };
        fetchPrayerTimes();
    </script>
</body>
</html>
